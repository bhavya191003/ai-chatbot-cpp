<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ AI Chatbot</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
   <style>
    body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        background-color: #f3f4f6;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    #chat-container { 
        width: 100%; 
        max-width: 450px; 
        background: #ffffff; 
        border-radius: 16px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    #header { 
        background: #1f2937; 
        color: #ffffff; 
        padding: 20px; 
        text-align: center; 
        font-weight: 600;
        font-size: 1.1rem;
        letter-spacing: 0.5px;
    }
    #chat-window { 
        height: 500px; 
        padding: 20px; 
        overflow-y: auto; 
        display: flex; 
        flex-direction: column; 
        gap: 12px; 
    }
    .message { 
        padding: 12px 16px; 
        border-radius: 18px; 
        max-width: 75%; 
        line-height: 1.5; 
        word-wrap: break-word;
        font-size: 0.95rem;
    }
    .user { 
        background: #3b82f6; 
        color: white; 
        align-self: flex-end; 
        border-bottom-right-radius: 4px; 
    }
    .bot { 
        background: #f3f4f6; 
        color: #111827; 
        align-self: flex-start; 
        border-bottom-left-radius: 4px; 
    }
    #input-area { 
        display: flex; 
        padding: 16px; 
        background: #ffffff; 
        border-top: 1px solid #e5e7eb; 
    }
    input { 
        flex: 1; 
        padding: 12px 16px; 
        border: 1px solid #d1d5db; 
        border-radius: 24px; 
        outline: none;
        font-size: 0.95rem;
        transition: border-color 0.2s;
    }
    input:focus {
        border-color: #3b82f6;
    }
    button { 
        background: #3b82f6; 
        color: white; 
        border: none; 
        padding: 12px 20px; 
        margin-left: 12px; 
        border-radius: 24px; 
        cursor: pointer; 
        font-weight: 600;
        transition: background-color 0.2s;
    }
    button:hover { 
        background: #2563eb; 
    }
    .loading { 
        font-size: 0.85rem; 
        color: #6b7280; 
        font-style: italic; 
        align-self: flex-start; 
        margin-left: 12px;
        display: none; 
    }
</style>
</head>
<body>

<div id="chat-container">
    <div id="header">C++ AI Backend</div>
    <div id="chat-window">
        <div class="message bot">Hello! I am connected to your C++ server. What's on your mind?</div>
    </div>
    <div id="loading-indicator" class="loading">AI is thinking...</div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const messageText = inputField.value.trim();
        if (!messageText) return;

        addMessage(messageText, "user");
        inputField.value = "";
        
        document.getElementById("loading-indicator").style.display = "block";

        try {
           const response = await fetch("http://127.0.0.1:8000/chat", {
                method: "POST",
               headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ user_message: messageText })
            });

            if (response.ok) {
                const data = await response.json();
                addMessage(data.bot_reply, "bot");
            } else {
                addMessage("Server Error: " + response.status, "bot");
            }
        } catch (error) {
            addMessage("Error: Could not connect to the C++ server. Is it running?", "bot");
        } finally {
            document.getElementById("loading-indicator").style.display = "none";
        }
    }

    function addMessage(text, sender) {
    const chatWindow = document.getElementById("chat-window");
    const msgDiv = document.createElement("div");
    msgDiv.className = `message ${sender}`;
    
    if (sender === "bot") {
        msgDiv.innerHTML = marked.parse(text);
    } else {
        msgDiv.textContent = text;
    }

    chatWindow.appendChild(msgDiv);
    chatWindow.scrollTop = chatWindow.scrollHeight; 
}

    function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
    }
</script>

</body>
</html>
